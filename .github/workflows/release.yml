name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-daemon:
    name: Build Daemon Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: daemon/go.sum

      - name: Build release binaries
        working-directory: daemon
        run: make release

      - name: Generate checksums
        working-directory: daemon/bin
        run: sha256sum cordclaw-daemon-* > checksums.txt

      - name: Upload daemon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daemon-release-artifacts
          path: daemon/bin/*
          if-no-files-found: error

  publish-plugin:
    name: Publish npm Plugin
    runs-on: ubuntu-latest
    needs: build-daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure NPM token exists
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN is required for release publishes."
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        working-directory: plugin
        run: npm ci

      - name: Test
        working-directory: plugin
        run: npm test

      - name: Build
        working-directory: plugin
        run: npm run build

      - name: Publish to npm
        working-directory: plugin
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-daemon
      - publish-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download daemon artifacts
        uses: actions/download-artifact@v4
        with:
          name: daemon-release-artifacts
          path: daemon/bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            daemon/bin/cordclaw-daemon-linux-amd64
            daemon/bin/cordclaw-daemon-linux-arm64
            daemon/bin/cordclaw-daemon-darwin-amd64
            daemon/bin/cordclaw-daemon-darwin-arm64
            daemon/bin/cordclaw-daemon-windows-amd64.exe
            daemon/bin/checksums.txt
          fail_on_unmatched_files: true
