name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  daemon:
    name: Daemon (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: daemon/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./cmd/cordclaw-daemon

  plugin:
    name: Plugin (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
