name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  daemon:
    name: Daemon (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: daemon/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./cmd/cordclaw-daemon

  plugin:
    name: Plugin (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  pack-verify:
    name: Pack Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Verify pack metadata and simulations
        run: python pack/tests/verify_pack.py
