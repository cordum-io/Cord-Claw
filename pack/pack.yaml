apiVersion: cordum.io/v1alpha1
kind: Pack

metadata:
  id: cordclaw
  version: 0.1.0
  title: CordClaw - OpenClaw Governance
  description: >
    Pre-dispatch governance policies for OpenClaw agent actions.
    Evaluates shell execution, file access, browser control, messaging,
    and memory operations against declarative safety policies before
    they execute.
  author: Cordum
  homepage: https://github.com/cordum-io/Cord-Claw
  image: https://cordum.io/packs/cordclaw/icon.svg
  tags:
    - governance
    - openclaw
    - security
    - agent-safety

compatibility:
  protocolVersion: 1
  minCoreVersion: 0.1.0

topics:
  - name: job.cordclaw.exec
    capability: cordclaw.shell-execute
    riskTags: ["exec", "system", "write"]
    requires: []
  - name: job.cordclaw.file-read
    capability: cordclaw.file-read
    riskTags: ["filesystem", "read"]
    requires: []
  - name: job.cordclaw.file-write
    capability: cordclaw.file-write
    riskTags: ["filesystem", "write"]
    requires: []
  - name: job.cordclaw.browser
    capability: cordclaw.browser-navigate
    riskTags: ["network", "browser"]
    requires: []
  - name: job.cordclaw.browser-action
    capability: cordclaw.browser-interact
    riskTags: ["network", "browser", "write"]
    requires: []
  - name: job.cordclaw.web-search
    capability: cordclaw.web-search
    riskTags: ["network", "read"]
    requires: []
  - name: job.cordclaw.web-fetch
    capability: cordclaw.web-fetch
    riskTags: ["network", "read"]
    requires: []
  - name: job.cordclaw.message-send
    capability: cordclaw.message-send
    riskTags: ["messaging", "write", "external"]
    requires: []
  - name: job.cordclaw.memory-write
    capability: cordclaw.memory-write
    riskTags: ["memory", "write", "persistence"]
    requires: []
  - name: job.cordclaw.cron-create
    capability: cordclaw.schedule-create
    riskTags: ["schedule", "write", "autonomy"]
    requires: []
  - name: job.openclaw.tool_call
    capability: openclaw.tool-call
    riskTags: ["tool_call"]
    requires: []
  - name: job.openclaw.prompt_build
    capability: openclaw.prompt-build
    riskTags: ["prompt", "prompt_pii"]
    requires: []
  - name: job.openclaw.agent_start
    capability: openclaw.agent-start
    riskTags: ["agent_lifecycle"]
    requires: []
  - name: job.openclaw.message_write
    capability: openclaw.message-write
    riskTags: ["messaging", "write"]
    requires: []
  - name: job.openclaw.cron_fire
    capability: openclaw.cron-fire
    riskTags: ["schedule", "autonomy", "cron_fire"]
    requires: []
  - name: job.openclaw.result_gating
    capability: openclaw.result-gating
    riskTags: ["result_gating", "egress"]
    requires: []

resources:
  schemas:
    - id: cordclaw/OpenClawAction
      path: schemas/OpenClawAction.json
    - id: cordclaw/PromptPIIRedact
      path: schemas/PromptPIIRedact.json
  workflows:
    - id: cordclaw.quarantine-review
      path: workflows/quarantine-review.yaml

overlays:
  config:
    - name: pools
      scope: system
      key: pools
      strategy: json_merge_patch
      path: overlays/pools.patch.yaml
  policy:
    - name: safety
      strategy: bundle_fragment
      path: overlays/policy.fragment.yaml
    - name: openclaw-safety
      strategy: bundle_fragment
      path: policies/openclaw-safety.yaml

tests:
  policySimulations:
    - name: deny-destructive-exec
      request:
        tenantId: default
        topic: job.cordclaw.exec
        capability: cordclaw.shell-execute
        riskTags: ["exec", "system", "write", "destructive"]
      expectDecision: DENY
    - name: allow-safe-file-read
      request:
        tenantId: default
        topic: job.cordclaw.file-read
        capability: cordclaw.file-read
        riskTags: ["filesystem", "read"]
      expectDecision: ALLOW
    - name: deny-secrets-write
      request:
        tenantId: default
        topic: job.cordclaw.file-write
        capability: cordclaw.file-write
        riskTags: ["filesystem", "write", "secrets"]
      expectDecision: DENY
    - name: approve-external-message
      request:
        tenantId: default
        topic: job.cordclaw.message-send
        capability: cordclaw.message-send
        riskTags: ["messaging", "write", "external"]
      expectDecision: REQUIRE_APPROVAL
    - name: allow-browser-navigate
      request:
        tenantId: default
        topic: job.cordclaw.browser
        capability: cordclaw.browser-navigate
        riskTags: ["network", "browser"]
      expectDecision: ALLOW
    - name: approve-cron-create
      request:
        tenantId: default
        topic: job.cordclaw.cron-create
        capability: cordclaw.schedule-create
        riskTags: ["schedule", "write", "autonomy"]
      expectDecision: REQUIRE_APPROVAL
    - name: deny-cloud-exec
      request:
        tenantId: default
        topic: job.cordclaw.exec
        capability: cordclaw.shell-execute
        riskTags: ["exec", "system", "write", "cloud", "infrastructure"]
      expectDecision: DENY
    - name: approve-package-install
      request:
        tenantId: default
        topic: job.cordclaw.exec
        capability: cordclaw.shell-execute
        riskTags: ["exec", "system", "write", "package-install"]
      expectDecision: REQUIRE_APPROVAL
    - name: deny-cron-agent-start-drift
      request:
        tenantId: default
        topic: job.openclaw.agent_start
        capability: openclaw.agent-start
        riskTags: ["agent_lifecycle", "cron_fire"]
      expectDecision: DENY
    - name: deny-unknown-cron-agent-start
      request:
        tenantId: default
        topic: job.openclaw.agent_start
        capability: openclaw.agent-start
        riskTags: ["agent_lifecycle", "cron_fire", "cron_origin_unknown"]
      expectDecision: DENY
    - name: allow-user-agent-start
      request:
        tenantId: default
        topic: job.openclaw.agent_start
        capability: openclaw.agent-start
        riskTags: ["agent_lifecycle"]
      expectDecision: ALLOW
    - name: deny-openclaw-tool-call-secrets
      request:
        tenantId: default
        topic: job.openclaw.tool_call
        capability: openclaw.tool-call
        riskTags: ["secrets"]
      expectDecision: DENY
    - name: allow-openclaw-tool-call
      request:
        tenantId: default
        topic: job.openclaw.tool_call
        capability: openclaw.tool-call
        riskTags: ["tool_call"]
      expectDecision: ALLOW
    - name: constrain-openclaw-prompt-build-redact
      request:
        tenantId: default
        topic: job.openclaw.prompt_build
        capability: openclaw.prompt-build
        riskTags: ["prompt_pii"]
      expectDecision: CONSTRAIN
    - name: allow-openclaw-message-write-slack-send
      request:
        tenantId: default
        topic: job.openclaw.message_write
        capability: openclaw.message-write
        labels:
          channel_action: slack.send
          channel_provider: slack
          action: send
        riskTags: ["messaging", "external", "write", "channel_action"]
      expectDecision: ALLOW
    - name: deny-openclaw-message-write-slack-delete
      request:
        tenantId: default
        topic: job.openclaw.message_write
        capability: openclaw.message-write
        labels:
          channel_action: slack.delete
          channel_provider: slack
          action: delete
        riskTags: ["messaging", "external", "write", "destructive", "channel_action"]
      expectDecision: DENY
    - name: deny-openclaw-message-write-slack-upload-exfil
      request:
        tenantId: default
        topic: job.openclaw.message_write
        capability: openclaw.message-write
        labels:
          channel_action: slack.upload_file
          channel_provider: slack
          action: upload_file
        riskTags: ["messaging", "external", "write", "exfil-risk", "channel_action"]
      expectDecision: DENY
    - name: deny-openclaw-message-write-unknown-channel-action
      request:
        tenantId: default
        topic: job.openclaw.message_write
        capability: openclaw.message-write
        labels:
          channel_action: unknown.nuke
        riskTags: ["messaging", "external", "channel_action_unknown"]
      expectDecision: DENY
    - name: deny-openclaw-cron-fire-drift
      request:
        tenantId: default
        topic: job.openclaw.cron_fire
        capability: openclaw.cron-fire
        riskTags: ["cron_fire", "cron_origin_unknown"]
      expectDecision: DENY
    - name: constrain-openclaw-result-gating-budget
      request:
        tenantId: default
        topic: job.openclaw.result_gating
        capability: openclaw.result-gating
        riskTags: ["result_gating"]
      expectDecision: CONSTRAIN
