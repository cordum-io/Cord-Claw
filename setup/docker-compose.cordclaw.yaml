services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data

  nats:
    image: nats:2-alpine
    command:
      - "-c"
      - "/etc/nats/nats.conf"
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - ./tls/nats-cert.pem:/etc/nats/tls/cert.pem:ro
      - ./tls/nats-key.pem:/etc/nats/tls/key.pem:ro

  safety-kernel:
    image: ghcr.io/cordum-io/cordum-safety-kernel:${CORDUM_VERSION:-latest}
    environment:
      - SAFETY_KERNEL_ADDR=0.0.0.0:50051
      - SAFETY_POLICY_PATH=/config/safety.yaml
      - SAFETY_POLICY_SIGNATURE_PATH=/config/safety.yaml.sig
      - SAFETY_POLICY_PUBLIC_KEY=${SAFETY_POLICY_PUBLIC_KEY}
      - SAFETY_POLICY_PUBLIC_KEY_ID=${SAFETY_POLICY_PUBLIC_KEY_ID:-default}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CORDUM_ENV=production
    volumes:
      - ./config/safety.yaml:/config/safety.yaml:ro
      - ./config/safety.yaml.sig:/config/safety.yaml.sig:ro
    ports:
      - "50051:50051"
    depends_on:
      - redis

  gateway:
    image: ghcr.io/cordum-io/cordum-api-gateway:${CORDUM_VERSION:-latest}
    environment:
      - CORDUM_API_KEY=${CORDUM_API_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NATS_URL=tls://nats:4222
      - NATS_TLS_CA=/tls/nats-cert.pem
      - NATS_TLS_SERVER_NAME=nats
      - SAFETY_KERNEL_ADDR=safety-kernel:50051
      - CORDUM_ENV=production
    volumes:
      - ./packs:/packs:ro
      - ./tls/nats-cert.pem:/tls/nats-cert.pem:ro
    ports:
      - "8081:8081"
      - "8080:8080"
    depends_on:
      - redis
      - nats
      - safety-kernel

  scheduler:
    image: ghcr.io/cordum-io/cordum-scheduler:${CORDUM_VERSION:-latest}
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NATS_URL=tls://nats:4222
      - NATS_TLS_CA=/tls/nats-cert.pem
      - NATS_TLS_SERVER_NAME=nats
      - SAFETY_KERNEL_ADDR=safety-kernel:50051
      - CORDUM_API_KEY=${CORDUM_API_KEY}
      - CORDUM_ENV=production
      - POOL_CONFIG_PATH=/config/pools.yaml
      - TIMEOUT_CONFIG_PATH=/config/timeouts.yaml
    volumes:
      - ./config/pools.yaml:/config/pools.yaml:ro
      - ./config/timeouts.yaml:/config/timeouts.yaml:ro
      - ./tls/nats-cert.pem:/tls/nats-cert.pem:ro
    depends_on:
      - redis
      - nats
      - safety-kernel

  dashboard:
    image: ghcr.io/cordum-io/cordum-dashboard:${CORDUM_VERSION:-latest}
    environment:
      - CORDUM_GATEWAY_URL=http://gateway:8081
    ports:
      - "8082:8082"
    depends_on:
      - gateway

volumes:
  redis-data:
