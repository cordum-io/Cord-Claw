version: "1"
default_tenant: default
profile: custom-moderate

rules:
  - id: cordclaw-custom-deny-destructive
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["destructive"]
    decision: deny
    reason: Destructive commands are blocked.

  - id: cordclaw-custom-deny-cloud
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["cloud", "infrastructure"]
    decision: deny
    reason: Cloud infrastructure commands are blocked.

  - id: cordclaw-custom-allow-package-install-constrained
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["package-install"]
    decision: allow_with_constraints
    constraints:
      sandbox: true
      timeout_seconds: 120
    reason: Package install is allowed in sandbox with an extended timeout.

  - id: cordclaw-custom-approve-messages
    match:
      topics: ["job.cordclaw.message-send"]
    decision: require_approval
    reason: Outbound messaging requires approval.

  - id: cordclaw-custom-constrain-general-exec
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["exec"]
    decision: allow_with_constraints
    constraints:
      sandbox: true
      timeout_seconds: 30
    reason: General execution is allowed in a constrained sandbox.

  - id: cordclaw-custom-allow-file-read
    match:
      topics: ["job.cordclaw.file-read"]
    decision: allow
    reason: File reads are allowed.

  - id: cordclaw-custom-allow-web
    match:
      topics: ["job.cordclaw.web-search", "job.cordclaw.web-fetch"]
    decision: allow
    reason: Web actions are allowed.
